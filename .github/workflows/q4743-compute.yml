name: q4743-compute

on:
  pull_request:
    branches: [main]

jobs:
  compute:
    runs-on: ubuntu-latest
    steps:
      - name: Install mpmath
        run: python -m pip install --quiet mpmath
      - name: Compute exact recurrence table
        shell: python
        run: |
          from fractions import Fraction
          import mpmath as mp

          mp.mp.dps = 80

          def a0(n):
              return 41218*n**3 - 48459*n**2 + 20010*n - 2871

          def a1(n):
              return 2*(
                  48802112*n**9 + 89030880*n**8 + 36002654*n**7
                  - 24317344*n**6 - 19538418*n**5 + 1311365*n**4
                  + 3790503*n**3 + 460056*n**2 - 271701*n - 60291
              )

          def a2(n):
              return (
                  3874492*n**8 - 2617900*n**7 - 3144314*n**6
                  + 2947148*n**5 + 647130*n**4 - 1182926*n**3
                  + 115771*n**2 + 170716*n - 44541
              )

          def next_term(seq, n):
              A = (n+1)**6 * a0(n)
              return (
                  -a1(n)*seq[n]
                  + 4*(2*n-1)*a2(n)*seq[n-1]
                  + 4*(n-1)**4*(2*n-1)*(2*n-3)*a0(n+1)*seq[n-2]
              ) / A

          q = [Fraction(-1), Fraction(42), Fraction(-17934)]
          p = [Fraction(0), Fraction(87,2), Fraction(-1190161,64)]
          for n in range(2, 29):
              q.append(next_term(q, n))
              p.append(next_term(p, n))

          z5 = mp.zeta(5)

          print('BEGIN_TABLE')
          print('| n | q_n | p_n | p_n/q_n | error |')
          print('|---:|---:|---:|---:|---:|')
          for n in range(30):
              rr = mp.mpf(p[n].numerator) / p[n].denominator / (mp.mpf(q[n].numerator) / q[n].denominator)
              err = rr-z5
              print(f'| {n} | `{q[n]}` | `{p[n]}` | {mp.nstr(rr,30)} | {mp.nstr(err,10)} |')
          print('END_TABLE')

          print('BEGIN_MOBIUS')
          print('| n | sigma1=q[n-1]/q[n] | sigma2=q[n-2]/q[n] | r=p[n]/q[n] | u=p[n-1]/q[n] | v=p[n-2]/q[n] |')
          print('|---:|---:|---:|---:|---:|---:|')
          for n in range(2,6):
              vals = [q[n-1]/q[n], q[n-2]/q[n], p[n]/q[n], p[n-1]/q[n], p[n-2]/q[n]]
              dec = [mp.mpf(x.numerator)/x.denominator for x in vals]
              print('| '+str(n)+' | '+' | '.join(mp.nstr(x,30) for x in dec)+' |')
          print('END_MOBIUS')

          roots = mp.polyroots([1,2368,-752,-16], maxsteps=1000, error=False)
          roots = sorted(roots, key=lambda z: abs(z), reverse=True)
          mu = roots[0]
          print('BEGIN_LIMITS')
          print('zeta5=', mp.nstr(z5,60))
          print('roots=', [mp.nstr(x,50) for x in roots])
          print('mu_dom=', mp.nstr(mu,50))
          print('sigma1*=1/mu=', mp.nstr(1/mu,50))
          print('sigma2*=1/mu^2=', mp.nstr(1/mu**2,50))
          print('r*=zeta5=', mp.nstr(z5,50))
          print('u*=zeta5/mu=', mp.nstr(z5/mu,50))
          print('v*=zeta5/mu^2=', mp.nstr(z5/mu**2,50))
          print('END_LIMITS')

          for n in range(2,29):
              lhsq = ((n+1)**6*a0(n)*q[n+1] + a1(n)*q[n]
                      -4*(2*n-1)*a2(n)*q[n-1]
                      -4*(n-1)**4*(2*n-1)*(2*n-3)*a0(n+1)*q[n-2])
              lhsp = ((n+1)**6*a0(n)*p[n+1] + a1(n)*p[n]
                      -4*(2*n-1)*a2(n)*p[n-1]
                      -4*(n-1)**4*(2*n-1)*(2*n-3)*a0(n+1)*p[n-2])
              assert lhsq == 0 and lhsp == 0

          print('ALL_EXACT_RECURRENCE_RESIDUALS_ZERO')
