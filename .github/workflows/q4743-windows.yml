name: q4743-windows

on:
  pull_request:
    branches: [main]

jobs:
  compute:
    runs-on: windows-latest
    steps:
      - name: Install mpmath
        run: python -m pip install --quiet mpmath
      - name: Compute and print exact table
        shell: python
        run: |
          from fractions import Fraction
          import mpmath as mp
          mp.mp.dps = 100
          def a0(n): return 41218*n**3-48459*n**2+20010*n-2871
          def a1(n): return 2*(48802112*n**9+89030880*n**8+36002654*n**7-24317344*n**6-19538418*n**5+1311365*n**4+3790503*n**3+460056*n**2-271701*n-60291)
          def a2(n): return 3874492*n**8-2617900*n**7-3144314*n**6+2947148*n**5+647130*n**4-1182926*n**3+115771*n**2+170716*n-44541
          def nxt(s,n): return (-a1(n)*s[n]+4*(2*n-1)*a2(n)*s[n-1]+4*(n-1)**4*(2*n-1)*(2*n-3)*a0(n+1)*s[n-2])/((n+1)**6*a0(n))
          q=[Fraction(-1),Fraction(42),Fraction(-17934)]
          p=[Fraction(0),Fraction(87,2),Fraction(-1190161,64)]
          for n in range(2,29): q.append(nxt(q,n));p.append(nxt(p,n))
          z=mp.zeta(5)
          print('BEGIN_TABLE')
          for n in range(30):
              r=(mp.mpf(p[n].numerator)/p[n].denominator)/(mp.mpf(q[n].numerator)/q[n].denominator)
              print(n, q[n], p[n], mp.nstr(r,45), mp.nstr(r-z,15), sep=' | ')
          print('END_TABLE')
          print('BEGIN_MOBIUS')
          for n in range(2,6):
              xs=[q[n-1]/q[n],q[n-2]/q[n],p[n]/q[n],p[n-1]/q[n],p[n-2]/q[n]]
              print(n,*[mp.nstr(mp.mpf(x.numerator)/x.denominator,45) for x in xs],sep=' | ')
          print('END_MOBIUS')
          print('ZETA5',mp.nstr(z,80))
