name: Q4648 exact Apéry computation

on:
  pull_request:
    branches:
      - main
    paths:
      - code/q4648_compute.py
      - .github/workflows/q4648-apery.yml

permissions:
  contents: read

jobs:
  compute:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check sympy matplotlib
      - name: Compute through n=200
        run: python code/q4648_compute.py
      - name: Upload exact tables and plot
        uses: actions/upload-artifact@v4
        with:
          name: q4648-apery-results
          path: q4648-out/
          if-no-files-found: error
