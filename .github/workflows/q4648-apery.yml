name: Q4648 exact Apéry computation

on:
  push:
    branches:
      - q4648-compute-a672b5aa
    paths:
      - code/q4648_compute.py
      - .github/workflows/q4648-apery.yml
  pull_request:
    branches:
      - main
    paths:
      - code/q4648_compute.py
      - .github/workflows/q4648-apery.yml

permissions:
  contents: write

jobs:
  compute:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: q4648-compute-a672b5aa
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check sympy matplotlib
      - name: Compute through n=200
        run: python code/q4648_compute.py
      - name: Upload exact tables and plot
        uses: actions/upload-artifact@v4
        with:
          name: q4648-apery-results
          path: q4648-out/
          if-no-files-found: error
      - name: Commit exact outputs to the temporary branch
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add q4648-out/
          git commit -m "Record Q4648 exact computation outputs"
          git push origin HEAD:q4648-compute-a672b5aa
