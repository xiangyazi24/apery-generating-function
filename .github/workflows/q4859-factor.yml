name: q4859 exact factor audit

on:
  push:
    branches: [q4859-factor-test]
    paths:
      - q4859_factor_sympy.py
      - .github/workflows/q4859-factor.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: q4859-apery-factor-audit
  cancel-in-progress: true

# Exact symbolic audit; the result is committed back to the temporary branch.
jobs:
  factor:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: q4859-factor-test
      - run: python3 -m pip install --upgrade sympy
      - name: Run and save exact Petkovsek audit
        shell: bash
        run: |
          set +e
          python3 -u q4859_factor_sympy.py 2>&1 | tee q4859_result.txt
          status=${PIPESTATUS[0]}
          echo "PROCESS_EXIT_STATUS=$status" | tee -a q4859_result.txt
          exit 0
      - name: Commit result certificate
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add q4859_result.txt
          git diff --cached --quiet || git commit -m 'Record Q4859 exact factor audit result'
          git push origin HEAD:q4859-factor-test
