name: q4859 exact factor audit

on:
  pull_request:
    branches: [main]
  push:
    branches: [q4859-factor-test]
  workflow_dispatch:

concurrency:
  group: q4859-apery-factor-audit
  cancel-in-progress: true

jobs:
  linux:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - run: python3 -m pip install --upgrade sympy
      - run: python3 -u q4859_factor_sympy.py

  windows:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - run: python -m pip install --upgrade sympy
      - run: python -u q4859_factor_sympy.py

  macos:
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - run: python3 -m pip install --upgrade sympy
      - run: python3 -u q4859_factor_sympy.py
