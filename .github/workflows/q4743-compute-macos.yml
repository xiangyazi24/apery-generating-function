name: q4743-compute-macos

on:
  push:
    branches: [q4743-compute]

jobs:
  compute:
    runs-on: macos-latest
    steps:
      - name: Compute exact recurrence table
        shell: python
        run: |
          from fractions import Fraction
          import mpmath as mp

          mp.mp.dps = 100

          def a0(n):
              return 41218*n**3 - 48459*n**2 + 20010*n - 2871

          def a1(n):
              return 2*(
                  48802112*n**9 + 89030880*n**8 + 36002654*n**7
                  - 24317344*n**6 - 19538418*n**5 + 1311365*n**4
                  + 3790503*n**3 + 460056*n**2 - 271701*n - 60291
              )

          def a2(n):
              return (
                  3874492*n**8 - 2617900*n**7 - 3144314*n**6
                  + 2947148*n**5 + 647130*n**4 - 1182926*n**3
                  + 115771*n**2 + 170716*n - 44541
              )

          def next_term(seq, n):
              den = (n+1)**6 * a0(n)
              num = (
                  -a1(n)*seq[n]
                  + 4*(2*n-1)*a2(n)*seq[n-1]
                  + 4*(n-1)**4*(2*n-1)*(2*n-3)*a0(n+1)*seq[n-2]
              )
              return num / den

          q = [Fraction(-1), Fraction(42), Fraction(-17934)]
          p = [Fraction(0), Fraction(87,2), Fraction(-1190161,64)]
          for n in range(2, 29):
              q.append(next_term(q, n))
              p.append(next_term(p, n))

          z5 = mp.zeta(5)
          print('BEGIN_TABLE')
          print('| n | q_n | p_n | p_n/q_n | error |')
          print('|---:|---:|---:|---:|---:|')
          for n in range(30):
              qq = mp.mpf(q[n].numerator)/q[n].denominator
              pp = mp.mpf(p[n].numerator)/p[n].denominator
              rr = pp/qq
              print(f'| {n} | `{q[n]}` | `{p[n]}` | {mp.nstr(rr,40)} | {mp.nstr(rr-z5,12)} |')
          print('END_TABLE')

          print('BEGIN_MOBIUS')
          print('| n | sigma1 | sigma2 | r | u | v |')
          print('|---:|---:|---:|---:|---:|---:|')
          for n in range(2,6):
              vals = [q[n-1]/q[n], q[n-2]/q[n], p[n]/q[n], p[n-1]/q[n], p[n-2]/q[n]]
              ds = [mp.mpf(x.numerator)/x.denominator for x in vals]
              print('| '+str(n)+' | '+' | '.join(mp.nstr(x,40) for x in ds)+' |')
          print('END_MOBIUS')

          roots = sorted(mp.polyroots([1,2368,-752,-16], maxsteps=1000), key=lambda z: abs(z), reverse=True)
          mu = roots[0]
          print('BEGIN_LIMITS')
          print('zeta5=', mp.nstr(z5,80))
          print('roots=', [mp.nstr(x,60) for x in roots])
          print('mu_dom=', mp.nstr(mu,60))
          print('sigma1_star=', mp.nstr(1/mu,60))
          print('sigma2_star=', mp.nstr(1/mu**2,60))
          print('r_star=', mp.nstr(z5,60))
          print('u_star=', mp.nstr(z5/mu,60))
          print('v_star=', mp.nstr(z5/mu**2,60))
          print('END_LIMITS')

          for n in range(2,29):
              lhsq = ((n+1)**6*a0(n)*q[n+1] + a1(n)*q[n]
                      -4*(2*n-1)*a2(n)*q[n-1]
                      -4*(n-1)**4*(2*n-1)*(2*n-3)*a0(n+1)*q[n-2])
              lhsp = ((n+1)**6*a0(n)*p[n+1] + a1(n)*p[n]
                      -4*(2*n-1)*a2(n)*p[n-1]
                      -4*(n-1)**4*(2*n-1)*(2*n-3)*a0(n+1)*p[n-2])
              assert lhsq == 0 and lhsp == 0
          print('ALL_EXACT_RECURRENCE_RESIDUALS_ZERO')
